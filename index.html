<!DOCTYPE html>
<html>
<head>
  <title>Vertical Scrolling Timeline</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="timeline" id="timeline-container">
    <!-- Timeline items will be generated here -->
  </div>

  <!-- Hover Text -->
  <div class="hover-text" id="hover-text-container">
    <div class="hover-text-content" id="hover-text-content">
      <!-- Text on hover will appear here -->
    </div>
  </div>

  <!-- Read More Pop-up -->
  <div class="read-more-popup" id="read-more-popup">
    <div class="popup-content" id="popup-content">
      <!-- More information about the item will appear here -->
      <img src="" alt="Image" id="popup-image"> <!-- Add an image element -->
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
